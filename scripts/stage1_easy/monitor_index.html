<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Stage1 Easy Monitor</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin: 0; background: #0b1020; color: #e8ecff; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
      .row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
      .card { background: #121a33; border: 1px solid #24305a; border-radius: 12px; padding: 12px; }
      h1 { font-size: 18px; margin: 0 0 10px; }
      h2 { font-size: 14px; margin: 0 0 8px; color: #cbd5ff; }
      pre { white-space: pre-wrap; word-break: break-word; background: #0b1020; border: 1px solid #24305a; padding: 10px; border-radius: 10px; margin: 0; }
      table { width: 100%; border-collapse: collapse; }
      td, th { border-bottom: 1px solid #24305a; padding: 6px 8px; font-size: 13px; vertical-align: top; }
      th { text-align: left; color: #cbd5ff; font-weight: 600; }
      .pill { display:inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid #24305a; }
      .running { background:#122b1d; border-color:#1d6b3c; color:#a7f3d0; }
      .done { background:#10223a; border-color:#1d4ed8; color:#bfdbfe; }
      .error { background:#3a1010; border-color:#ef4444; color:#fecaca; }
      .muted { color:#97a3d3; }
      a { color:#b3c7ff; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Stage1 Easy 监控</h1>
      <div class="row">
        <div class="card">
          <h2>进度（每 2 秒刷新）</h2>
          <table id="steps"></table>
        </div>
        <div class="card">
          <h2>系统</h2>
          <pre id="sys" class="muted">loading...</pre>
        </div>
      </div>
      <div style="height:12px"></div>
      <div class="card">
        <h2>日志（选择 step 查看 tail）</h2>
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
          <select id="logStep">
            <option value="preprocess_idrid">preprocess_idrid</option>
            <option value="preprocess_fgadr">preprocess_fgadr</option>
            <option value="build_dataset" selected>build_dataset</option>
            <option value="train">train</option>
            <option value="vllm_infer">vllm_infer</option>
            <option value="eval_metrics">eval_metrics</option>
          </select>
          <span class="muted">/api/log?step=...</span>
        </div>
        <pre id="log">(loading...)</pre>
      </div>
      <div style="height:12px"></div>
      <div class="card">
        <h2>原始状态 JSON</h2>
        <pre id="raw">loading...</pre>
      </div>
    </div>
    <script>
      function pill(status){
        const cls = status === "running" ? "pill running" : (status === "done" ? "pill done" : (status === "error" ? "pill error" : "pill"));
        return `<span class="${cls}">${status||"unknown"}</span>`;
      }
      function esc(s){ return (s||"").toString().replace(/[&<>]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c])); }
      async function tick(){
        const st = await fetch("/api/state").then(r=>r.json()).catch(()=>({}));
        const sys = await fetch("/api/system").then(r=>r.json()).catch(()=>({}));
        const step = document.getElementById("logStep").value;
        const log = await fetch(`/api/log?step=${encodeURIComponent(step)}`).then(r=>r.text()).catch(()=>"(log fetch failed)");
        document.getElementById("raw").textContent = JSON.stringify(st, null, 2);
        document.getElementById("sys").textContent = JSON.stringify(sys, null, 2);
        document.getElementById("log").textContent = log;
        const steps = st.steps || {};
        const keys = ["preprocess_idrid","preprocess_fgadr","build_dataset","train","vllm_infer","eval_metrics"];
        let html = "<tr><th>Step</th><th>Status</th><th>Info</th></tr>";
        for (const k of keys){
          const s = steps[k] || {};
          const info = [
            s.started_at ? `started: ${esc(s.started_at)}` : "",
            s.ended_at ? `ended: ${esc(s.ended_at)}` : "",
            s.created != null ? `created: ${esc(s.created)}` : "",
            s.out ? `out: ${esc(s.out)}` : "",
            s.error ? `error: ${esc(s.error)}` : ""
          ].filter(Boolean).join("<br/>");
          html += `<tr><td>${esc(k)}</td><td>${pill(s.status)}</td><td class="muted">${info||"-"}</td></tr>`;
        }
        document.getElementById("steps").innerHTML = html;
      }
      tick();
      setInterval(tick, 2000);
    </script>
  </body>
</html>
