### v8 strict control: v3 training flow + v7 CoT data
### Difference from l3_six_lesion_calib_pilot:
###   dataset only: fundus_l3_v7_v3dist_v6cot_train
### Goal:
###   isolate whether the v7/v6 four-section CoT format helps or hurts when
###   the proven v3 starting adapter and training hyperparameters are preserved.

### model
model_name_or_path: ./models/Qwen3-VL-8B-Instruct
adapter_name_or_path: saves/qwen3-vl-8b-fundus/lora/l3_targeted_calib_v3_full
trust_remote_code: true
flash_attn: sdpa

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all
freeze_vision_tower: false
freeze_multi_modal_projector: false
freeze_language_model: false

### dataset
dataset_dir: data/annotation
media_dir: data
dataset: fundus_l3_v7_v3dist_v6cot_train
template: qwen3_vl_nothink
cutoff_len: 2304
max_samples: 7200
preprocessing_num_workers: 4
dataloader_num_workers: 0
overwrite_cache: true

### qwen3-vl image tokens
image_max_pixels: 262144
image_min_pixels: 65536

### output
output_dir: saves/qwen3-vl-8b-fundus/lora/v8_l3_v3flow_v7cot
logging_steps: 10
save_steps: 150
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: tensorboard

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 6.0e-6
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
fp16: false
max_grad_norm: 1.0
optim: adamw_torch
gradient_checkpointing: true
ddp_timeout: 180000000
