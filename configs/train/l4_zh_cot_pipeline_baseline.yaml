### model
# v3: continues from L3 base, trains on cleaner v3 data (G4 NV-direct via
# augmentation, Step2b dropped, Step3c capped, G1 rebalanced).
model_name_or_path: ./models/Qwen3-VL-8B-Instruct
adapter_name_or_path: saves/qwen3-vl-8b-fundus/lora/l3_six_lesion_calib_pilot
trust_remote_code: true
flash_attn: sdpa

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all
freeze_vision_tower: false
freeze_multi_modal_projector: false
freeze_language_model: false

### dataset
dataset_dir: data/annotation
media_dir: data
dataset: fundus_l4_unified_lesion_cot_v3
template: qwen3_vl_nothink
cutoff_len: 2304
max_samples: 7000
preprocessing_num_workers: 4
dataloader_num_workers: 0
overwrite_cache: true

### qwen3-vl image tokens
image_max_pixels: 262144
image_min_pixels: 65536

### output
output_dir: saves/qwen3-vl-8b-fundus/lora/l4_unified_lesion_cot_v3
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: tensorboard

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.5e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.08
bf16: true
fp16: false
max_grad_norm: 1.0
optim: adamw_torch
gradient_checkpointing: true
ddp_timeout: 180000000
