### Conservative Stage1 replay calibration

### model
model_name_or_path: ./models/Qwen3-VL-8B-Instruct
adapter_name_or_path: saves/qwen3-vl-8b-fundus/lora/stage1_en_cot
trust_remote_code: true
flash_attn: sdpa

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false

### dataset
dataset_dir: data/annotation_v4
media_dir: data
dataset: fundus_stage1_en_cot_replay_calibration_train
template: qwen3_vl_nothink
cutoff_len: 2304
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 4

### qwen3-vl image tokens
image_max_pixels: 589824
image_min_pixels: 65536

### output
output_dir: saves/qwen3-vl-8b-fundus/lora/stage1_en_cot_replay_calibrated
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 5.0e-7
num_train_epochs: 0.35
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
fp16: false
gradient_checkpointing: true
eval_strategy: "no"
save_strategy: steps
load_best_model_at_end: false
max_grad_norm: 1.0
optim: adamw_torch
ddp_timeout: 180000000
