### Stage1 English calibrated adapter: accelerated Main-4 DDR gold test

### model
model_name_or_path: ./models/Qwen3-VL-8B-Instruct
adapter_name_or_path: saves/qwen3-vl-8b-fundus/lora/stage1_en_cot_calibrated
trust_remote_code: true
flash_attn: sdpa

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
dataset_dir: data/annotation_v4
media_dir: data
eval_dataset: fundus_stage1_en_cot_gold_test
template: qwen3_vl_nothink
cutoff_len: 2304
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 4

### qwen3-vl image tokens
image_max_pixels: 262144
image_min_pixels: 65536

### output
output_dir: saves/qwen3-vl-8b-fundus/lora/stage1_eval/calibrated_gold_test
overwrite_output_dir: true
report_to: none

### eval
per_device_eval_batch_size: 4
predict_with_generate: true
do_sample: false
temperature: 0.0
top_p: 1.0
max_new_tokens: 384
bf16: true
fp16: false
ddp_timeout: 180000000
